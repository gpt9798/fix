{% extends "base.html" %}

{% block content %}
  <main class="hero">
    <div class="container hero-inner">
      <section class="hero-card" aria-label="Admin Dashboard">
        <div class="hero-badge">Admin</div>
        <h1 class="hero-title" style="margin-top:0; font-size:clamp(1.4rem,2.7vw,2rem);">Admin Dashboard</h1>
        <p class="hero-subtitle" style="margin-bottom:18px">
          Logged in as: <strong>{{ admin.username }}</strong>
        </p>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:14px; margin-top:14px;">
          <div style="background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14); border-radius:16px; padding:14px;">
            <div style="font-weight:900; opacity:.9; margin-bottom:6px;">Total Users</div>
            <div style="font-size:2rem; font-weight:900;">{{ total_users }}</div>
          </div>

          <div style="background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.14); border-radius:16px; padding:14px;">
            <div style="font-weight:900; opacity:.9; margin-bottom:6px;">Total Professionals</div>
            <div style="font-size:2rem; font-weight:900;">{{ total_professionals }}</div>
          </div>
        </div>

        <div class="cta-row" style="margin-top:18px">
          <a class="btn btn-secondary" href="{{ url_for('home') }}" style="min-width:260px">Back to Home</a>
          <a class="btn btn-primary" href="{{ url_for('logout') }}" style="min-width:260px">Logout</a>
        </div>
      </section>
    </div>
  </main>
{% endblock %}
